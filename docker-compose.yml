# Single-host production deployment.
#
# Local usage:
#   cp .env.example .env   # then fill in real values
#   docker compose --env-file .env up -d --build
#   docker compose exec bot npm run seed   # one-shot, idempotent
#
# Coolify usage:
#   Coolify injects all env vars from its UI directly into containers — no .env
#   file in the build context. Don't add `env_file: .env` here; it makes compose
#   fail when the file is absent. The `environment:` block below sets only
#   internals (Mongo host, port) — everything else comes from the host env.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--quiet"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Internal wiring — keep these fixed.
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: alyona_bot
      PORT: "3000"
      # Pass through host env (Coolify injects each of these).
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      OWNER_TG_IDS: ${OWNER_TG_IDS:?OWNER_TG_IDS is required}
      LIQPAY_PROVIDER_TOKEN: ${LIQPAY_PROVIDER_TOKEN:-}
      LIQPAY_TEST_MODE: ${LIQPAY_TEST_MODE:-true}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required (64 hex chars)}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NBU_API_URL: ${NBU_API_URL:-https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=USD&json}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - default
      - coolify
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Daily mongodump → ./backups, rotates to keep last 7.
  # Script inlined here so the service works both locally and on Coolify
  # without depending on a host bind-mount.
  backup:
    image: mongo:7
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - backups:/backups
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      DB_NAME: alyona_bot
      KEEP_DAYS: "7"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        sleep 10
        while true; do
          ts="$$(date -u +%Y-%m-%d_%H%M%S)"
          archive="/backups/$${DB_NAME}-$${ts}.archive.gz"
          echo "[backup] $$(date -u) starting → $$archive"
          if mongodump --host="$$DB_HOST" --port="$$DB_PORT" --db="$$DB_NAME" --archive="$$archive" --gzip --quiet; then
            echo "[backup] ok ($$(du -h "$$archive" | cut -f1))"
            # rotation
            ls -1t /backups/$${DB_NAME}-*.archive.gz 2>/dev/null | tail -n +$$((KEEP_DAYS + 1)) | xargs -r rm -f --
          else
            echo "[backup] FAILED, retrying in 5min"
            rm -f "$$archive"
            sleep 300
            continue
          fi
          sleep 86400
        done

volumes:
  mongo-data:
  backups:

# Coolify global network — same network Traefik and other working
# Coolify services use. We attach the bot here so it gets the same
# internet egress + DNS resolver as nixpacks/dockerfile builds (where
# app-specific compose overlay networks have no egress, causing
# api.telegram.org to be unreachable).
networks:
  default: {}
  coolify:
    name: coolify
    external: true
